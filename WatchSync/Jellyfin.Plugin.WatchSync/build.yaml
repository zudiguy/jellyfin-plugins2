overview: "Sync watch history between libraries of different qualities (4K/HD)"
description: |
  This plugin automatically synchronizes watch history between libraries
  of different qualities (4K/HD). When a movie is watched in 4K, the HD version is
  also marked as watched (and vice versa).

  Features:
  - Automatic sync on playback stop
  - Identification via IMDB, TMDB, TVDB
  - Support for movies and TV series
  - Granular configuration of synced data
  - Scheduled task for full synchronization
