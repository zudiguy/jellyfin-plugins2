framework: "net9.0"
owner: "JellyTag"
overview: "Adds quality badges (4K, 1080p, etc.) to media posters and thumbnails."
description: |
  JellyTag automatically adds quality resolution badges to your media posters and thumbnails.
  Badges are visible on all clients including web, mobile, TV, and Kodi.

  Features:
  - Automatic quality detection based on video resolution
  - Configurable badge position (corners)
  - Configurable badge size
  - Image caching for performance
  - Support for 4K, 1080p, 720p, and SD badges

category: "General"
artifacts:
