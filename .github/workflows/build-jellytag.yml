name: Build JellyTag

on:
  push:
    tags:
      - 'jellytag-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellytag/Jellyfin.Plugin.JellyTag/Jellyfin.Plugin.JellyTag.csproj

      - name: Build plugin
        run: dotnet publish Jellytag/Jellyfin.Plugin.JellyTag/Jellyfin.Plugin.JellyTag.csproj -c Release -o output

      - name: Create meta.json
        run: |
          cat > output/meta.json << 'EOF'
          {
              "guid": "f4a2e8c1-9b3d-4f7a-b6c5-2d8e1a3f9b04",
              "name": "JellyTag (STRM Support)",
              "overview": "Adds quality badges to media posters - with .strm filename parsing",
              "description": "JellyTag with .strm file support. Extracts metadata from filenames like [Remux-2160p HEVC DV HDR10 TrueHD Atmos 7.1]",
              "owner": "zudiguy",
              "category": "General",
              "version": "2.1.0.0",
              "targetAbi": "10.11.0.0",
              "timestamp": "2026-03-11T00:00:00Z"
          }
          EOF

      - name: Create ZIP archive
        run: |
          cd output
          zip -r jellytag-2.1.0.0.zip *.dll meta.json
          cd ..

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/jellytag-}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: JellyTag v${{ steps.get_version.outputs.VERSION }} (STRM Support)
          body: |
            ## JellyTag with .strm Filename Support

            This release adds support for .strm files by parsing metadata from filenames.

            ### Features
            - Parses .strm filenames like `Movie [Remux-2160p HEVC DV HDR10 TrueHD Atmos 7.1].strm`
            - Extracts resolution, HDR, video codec, audio codec, and channels
            - Falls back to standard metadata for non-.strm files

            ### Installation
            1. Add repository: `https://raw.githubusercontent.com/zudiguy/jellyfin-plugins2/main/manifest.json`
            2. Install from Catalog
            3. Restart Jellyfin

            Based on JellyTag v2.0.2.0 by [Atilil](https://github.com/Atilil/jellyfin-plugins)
          files: output/jellytag-2.1.0.0.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellytag-plugin
          path: output/jellytag-2.1.0.0.zip
